<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2a3a86" />
    <meta
      name="description"
      content="RemoteRecruit — the first fully global, fee-free job board. Showcase your talents and connect with remote opportunities anywhere in the world."
    />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="RemoteRecruit — The First Fully Global Job Board" />
    <meta
      property="og:description"
      content="A fee-free, fully global job board. Showcase your talents and connect with remote opportunities anywhere in the world."
    />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts: preconnect + async (preload-then-swap) so the stylesheet never
         blocks first paint; only the weights actually used are requested. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <title>RemoteRecruit — The First Fully Global Job Board</title>

    <!-- No-JS / crawler fallback: never hide content behind the scroll-reveal -->
    <noscript>
      <style>
        .reveal {
          opacity: 1 !important;
          transform: none !important;
        }
      </style>
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
